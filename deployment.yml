apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-hello-world
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-world
  template:
    metadata:
      labels:
        app: hello-world
    spec:
      containers:
      - name: java-app
        # Replace with your DockerHub username
        image: mrrobot7781/java-hello-world:latest
        imagePullPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: java-hello-service
spec:
  selector:
    app: hello-world
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: NodePort # Changed to NodePort for easier access in Minikube
